name: Test Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        node: [
          {"name": "LTS", "version": "lts/-2"},
          {"name": "latest", "version": "latest"}
        ]
    name: Node ${{ matrix.node.name }}
    env:
      CI: true
    steps:
      - uses: actions/checkout@v6
      - name: Setup node ${{ matrix.node.name }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node.version }}
      - run: npm install
      - run: npm run build:all
      - name: Archive production artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-node-${{ matrix.node.name }}
          path: dist
          retention-days: 30
      # E2E loads the Chat panel, which calls GET /api/v1/models via the Vite proxy → backend :8000.
      - name: Set up Python (E2E API)
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies (E2E)
        run: pip install -r backend/requirements.txt
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Start backend for E2E
        run: |
          (cd backend && python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 --log-level warning) &
          echo $! > /tmp/openscad-e2e-backend.pid
          for i in $(seq 1 90); do
            if curl -sf "http://127.0.0.1:8000/api/v1/health" >/dev/null; then
              echo "Backend ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Backend failed to become healthy in time"
          exit 1
      - run: NODE_ENV=development npm run test:e2e
      - run: NODE_ENV=production npm run test:e2e
      - name: Stop backend for E2E
        if: always()
        run: |
          if [ -f /tmp/openscad-e2e-backend.pid ]; then
            kill "$(cat /tmp/openscad-e2e-backend.pid)" 2>/dev/null || true
          fi
